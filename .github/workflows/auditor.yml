name: Run Autonomous Auditor

on:
  workflow_dispatch:  # Manual trigger
  schedule:
    - cron: '0 */6 * * *'  # Run every 6 hours (optional)

jobs:
  audit:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4  # Updated from v3
      
      - name: Set up Python
        uses: actions/setup-python@v5  # Updated from v4
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install supabase groq google-generativeai pandas
      
      - name: Run auditor script
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GMAIL_USER: ${{ secrets.GMAIL_USER }}
          GMAIL_PASS: ${{ secrets.GMAIL_PASS }}
        run: python your_auditor_script.py  # Change to your filename
